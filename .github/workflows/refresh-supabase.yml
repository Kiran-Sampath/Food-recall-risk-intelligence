name: Refresh Supabase Data

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of report-date days to refresh."
        required: false
        default: "14"
        type: string

jobs:
  refresh:
    name: Fetch and load daily recalls
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LOOKBACK_DAYS: ${{ inputs.lookback_days }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Compute report-date window
        id: dates
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import date, timedelta

          lookback_days = int(os.environ.get("LOOKBACK_DAYS") or "14")
          end = date.today() - timedelta(days=1)
          start = end - timedelta(days=max(lookback_days - 1, 0))

          print(f"start={start.isoformat()}")
          print(f"end={end.isoformat()}")
          PY

      - name: Build pipeline image
        run: docker build -t food-recall-risk-intelligence .

      - name: Run Spark pipeline and load Supabase
        run: |
          docker run --rm \
            -e SUPABASE_URL \
            -e SUPABASE_SERVICE_ROLE_KEY \
            food-recall-risk-intelligence \
            python scripts/run_pipeline.py \
              --complete-download \
              --filter-report-start "${{ steps.dates.outputs.start }}" \
              --filter-report-end "${{ steps.dates.outputs.end }}" \
              --load-supabase \
              --supabase-tables recalls
