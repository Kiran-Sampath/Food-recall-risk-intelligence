name: Refresh Supabase Data

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date to fetch in YYYY-MM-DD format. Defaults to yesterday UTC."
        required: false
        type: string

jobs:
  refresh:
    name: Fetch and load daily recalls
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REQUESTED_REPORT_DATE: ${{ inputs.report_date }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Compute report date
        id: dates
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import date, timedelta

          requested = os.environ.get("REQUESTED_REPORT_DATE", "").strip()
          target = requested or (date.today() - timedelta(days=1)).isoformat()

          print(f"report_date={target}")
          PY

      - name: Build pipeline image
        run: docker build -t food-recall-risk-intelligence .

      - name: Run Spark pipeline and load Supabase
        run: |
          docker run --rm \
            -e SUPABASE_URL \
            -e SUPABASE_SERVICE_ROLE_KEY \
            food-recall-risk-intelligence \
            python scripts/run_pipeline.py \
              --limit 5000 \
              --start-date "${{ steps.dates.outputs.report_date }}" \
              --end-date "${{ steps.dates.outputs.report_date }}" \
              --load-supabase \
              --supabase-tables recalls
